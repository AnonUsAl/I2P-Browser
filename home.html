<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I2P Browser Home</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            color-scheme: dark;
            --google-blue: #4285F4;
            --google-red: #EA4335;
            --google-yellow: #FBBC04;
            --google-green: #34A853;
            --bg: #101214;
            --surface: #1B1F23;
            --surface-2: #24292F;
            --surface-3: #2F363D;
            --text: #F1F3F4;
            --muted: #BDC1C6;
            --border: #3C4043;
            --focus: rgba(66, 133, 244, 0.28);
            --shadow: rgba(0, 0, 0, 0.38);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background:
                radial-gradient(circle at 18% 8%, rgba(66, 133, 244, 0.18), transparent 28%),
                radial-gradient(circle at 84% 16%, rgba(251, 188, 4, 0.13), transparent 24%),
                radial-gradient(circle at 78% 88%, rgba(52, 168, 83, 0.12), transparent 28%),
                var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        h1 {
            font-family: 'DM Serif Display', 'Roboto Slab', serif;
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 12px;
            letter-spacing: -0.02em;
        }

        h1 .accent {
            color: var(--google-blue);
            font-style: italic;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--muted);
            font-weight: 400;
        }

        .search-box {
            background: var(--surface);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 12px 36px var(--shadow);
            margin-bottom: 50px;
        }

        .search-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .engine-select {
            padding: 16px 14px;
            font-size: 1rem;
            border: 2px solid var(--border);
            border-radius: 12px;
            outline: none;
            font-family: 'Inter', sans-serif;
            background: var(--surface-2);
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .engine-select:focus {
            border-color: var(--google-blue);
            box-shadow: 0 0 0 3px var(--focus);
        }

        .search-input {
            flex: 1;
            padding: 16px 20px;
            font-size: 1.1rem;
            border: 2px solid var(--border);
            border-radius: 12px;
            outline: none;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
            background: var(--surface-2);
            color: var(--text);
        }

        .search-input:focus {
            border-color: var(--google-blue);
            box-shadow: 0 0 0 3px var(--focus);
        }

        .bookmarks {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .bookmark-card {
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .bookmark-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 30px var(--shadow);
            border-color: var(--google-blue);
        }

        .bookmark-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, rgba(66, 133, 244, 0.22), rgba(52, 168, 83, 0.18));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-bottom: 12px;
        }

        .bookmark-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 6px;
        }

        .bookmark-url {
            font-size: 0.9rem;
            color: var(--muted);
            word-break: break-all;
        }

        .bookmark-tag {
            display: inline-block;
            background: rgba(251, 188, 4, 0.16);
            color: var(--google-yellow);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 10px;
            margin-right: 6px;
        }

        .delete-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            background: transparent;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 4px;
            transition: color 0.2s;
        }

        .delete-btn:hover {
            color: var(--google-red);
        }

        .add-bookmark {
            background: var(--google-blue);
            color: #FFFFFF;
            border: none;
            border-radius: 12px;
            padding: 16px 32px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 30px;
        }

        .add-bookmark:hover {
            background: #5A95F5;
            transform: translateY(-2px);
            box-shadow: 0 8px 22px rgba(66, 133, 244, 0.32);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(16, 18, 20, 0.72);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 18px 52px rgba(0, 0, 0, 0.48);
        }

        .modal-title {
            font-family: 'Roboto Slab', serif;
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 24px;
            color: var(--text);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text);
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.2s;
            background: var(--surface-2);
            color: var(--text);
        }

        .form-input:focus {
            border-color: var(--google-blue);
            box-shadow: 0 0 0 3px var(--focus);
        }

        .form-buttons {
            display: flex;
            gap: 12px;
            margin-top: 28px;
        }

        .btn {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--google-green);
            color: #FFFFFF;
        }

        .btn-primary:hover {
            background: #3CBD60;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--surface-3);
            color: var(--text);
        }

        .btn-secondary:hover {
            background: #3C444C;
        }

        .tag-input-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 8px;
            border: 2px solid var(--border);
            border-radius: 8px;
            min-height: 48px;
            align-items: center;
            background: var(--surface-2);
        }

        .tag-input-container:focus-within {
            border-color: var(--google-blue);
            box-shadow: 0 0 0 3px var(--focus);
        }

        .tag-item {
            display: inline-flex;
            align-items: center;
            background: rgba(234, 67, 53, 0.16);
            color: #F28B82;
            padding: 4px 8px 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .tag-remove {
            background: none;
            border: none;
            color: #F28B82;
            cursor: pointer;
            margin-left: 6px;
            font-size: 1.1rem;
            padding: 0 4px;
        }

        .tag-input {
            border: none;
            outline: none;
            flex: 1;
            min-width: 100px;
            padding: 4px;
            font-size: 0.9rem;
            background: transparent;
            color: var(--text);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>I2P <span class="accent">Browser</span></h1>
            <p class="subtitle">Secure, Private, Anonymous Browsing</p>
        </header>

        <div class="search-box">
            <div class="search-row">
                <select class="engine-select" id="engineSelect"></select>
                <input
                    type="text"
                    class="search-input"
                    id="searchInput"
                    placeholder="Enter URL or search..."
                    autofocus
                >
            </div>
        </div>

        <button class="add-bookmark" onclick="openModal()">+ Add Bookmark</button>

        <div class="bookmarks" id="bookmarks"></div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h2 class="modal-title">Add Bookmark</h2>
            <form id="bookmarkForm">
                <div class="form-group">
                    <label class="form-label">Title</label>
                    <input type="text" class="form-input" id="titleInput" required>
                </div>
                <div class="form-group">
                    <label class="form-label">URL</label>
                    <input type="text" class="form-input" id="urlInput" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Icon(emoji)</label>
                    <input type="text" class="form-input" id="iconInput" placeholder="🌐" maxlength="2">
                </div>
                <div class="form-group">
                    <label class="form-label">Tags (Press Enter to Add)</label>
                    <div class="tag-input-container" id="tagContainer">
                        <input type="text" class="tag-input" id="tagInput" placeholder="Enter tags...">
                    </div>
                </div>
                <div class="form-buttons">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const SEARCH_ENGINES = [
            { name: 'Ransack (I2P)',  url: 'http://ransack.i2p/?q=',            i2p: true  },
            { name: 'Search (I2P)',   url: 'http://search.i2p/?q=',             i2p: true  },
            { name: 'DuckDuckGo',     url: 'https://duckduckgo.com/?q=',        i2p: false },
            { name: 'Brave Search',   url: 'https://search.brave.com/search?q=',i2p: false },
            { name: 'SearXNG',        url: 'https://searx.be/search?q=',        i2p: false },
        ];

        let bookmarks = [];
        let currentTags = [];

        function loadEngineSelect() {
            const select = document.getElementById('engineSelect');
            const saved = localStorage.getItem('i2p_search_engine') || SEARCH_ENGINES[0].url;
            SEARCH_ENGINES.forEach(engine => {
                const opt = document.createElement('option');
                opt.value = engine.url;
                opt.textContent = engine.name;
                if (engine.url === saved) opt.selected = true;
                select.appendChild(opt);
            });
            select.addEventListener('change', function() {
                localStorage.setItem('i2p_search_engine', this.value);
            });
        }

        function getSearchUrl(query) {
            const base = document.getElementById('engineSelect').value;
            return base + encodeURIComponent(query);
        }

        function normalizeUrl(value) {
            const trimmed = value.trim();
            if (/^[a-z][a-z0-9+.-]*:/i.test(trimmed)) {
                return trimmed;
            }
            return 'http://' + trimmed;
        }

        function isProbablyUrl(value) {
            return /^[a-z][a-z0-9+.-]*:/i.test(value) || value.includes('.') || value.includes(':');
        }

        // load bookmarks from localStorage or set default bookmarks
        function loadBookmarks() {
            const saved = localStorage.getItem('i2p_bookmarks');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    bookmarks = Array.isArray(parsed) ? parsed : [];
                } catch (error) {
                    bookmarks = [];
                    localStorage.removeItem('i2p_bookmarks');
                }
            } else {
                // default bookmarks
                bookmarks = [
                    {
                        id: Date.now(),
                        title: 'I2P Router Console',
                        url: 'http://127.0.0.1:7657/',
                        icon: '⚙️',
                        tags: ['System', 'Router']
                    },
                    {
                        id: Date.now() + 1,
                        title: 'Ransack I2P',
                        url: 'http://ransack.i2p/',
                        icon: '🔍',
                        tags: ['Search']
                    }
                ];
                saveBookmarks();
            }
            renderBookmarks();
        }

        // Save bookmarks to localStorage
        function saveBookmarks() {
            localStorage.setItem('i2p_bookmarks', JSON.stringify(bookmarks));
        }

        // Render bookmarks to the page
        function renderBookmarks() {
            const container = document.getElementById('bookmarks');
            container.innerHTML = '';

            bookmarks.forEach(bookmark => {
                const card = document.createElement('div');
                card.className = 'bookmark-card';
                card.addEventListener('click', () => navigateTo(bookmark.url));

                const deleteButton = document.createElement('button');
                deleteButton.className = 'delete-btn';
                deleteButton.type = 'button';
                deleteButton.textContent = 'x';
                deleteButton.setAttribute('aria-label', `Delete ${bookmark.title}`);
                deleteButton.addEventListener('click', event => {
                    event.stopPropagation();
                    deleteBookmark(bookmark.id);
                });

                const icon = document.createElement('div');
                icon.className = 'bookmark-icon';
                icon.textContent = bookmark.icon || '🌐';

                const title = document.createElement('div');
                title.className = 'bookmark-title';
                title.textContent = bookmark.title;

                const url = document.createElement('div');
                url.className = 'bookmark-url';
                url.textContent = bookmark.url;

                card.append(deleteButton, icon, title, url);

                if (Array.isArray(bookmark.tags)) {
                    bookmark.tags.forEach(tag => {
                        const tagElement = document.createElement('span');
                        tagElement.className = 'bookmark-tag';
                        tagElement.textContent = tag;
                        card.appendChild(tagElement);
                    });
                }

                container.appendChild(card);
            });
        }

        // Navigate to a given URL
        function navigateTo(url) {
            window.location.href = url;
        }

        // Delete a bookmark by ID
        function deleteBookmark(id) {
            bookmarks = bookmarks.filter(b => b.id !== id);
            saveBookmarks();
            renderBookmarks();
        }

        // Open modal
        function openModal() {
            document.getElementById('modal').classList.add('active');
            document.getElementById('titleInput').focus();
        }

        // Close modal
        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            document.getElementById('bookmarkForm').reset();
            currentTags = [];
            renderTags();
        }

        // Tag input handler
        document.getElementById('tagInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                const tag = this.value.trim();
                if (tag && !currentTags.includes(tag)) {
                    currentTags.push(tag);
                    renderTags();
                    this.value = '';
                }
            }
        });

        // Render tags
        function renderTags() {
            const container = document.getElementById('tagContainer');
            const input = document.getElementById('tagInput');
            container.innerHTML = '';
            currentTags.forEach(tag => {
                const tagElement = document.createElement('span');
                tagElement.className = 'tag-item';
                tagElement.textContent = tag;

                const removeButton = document.createElement('button');
                removeButton.type = 'button';
                removeButton.className = 'tag-remove';
                removeButton.textContent = 'x';
                removeButton.setAttribute('aria-label', `Remove ${tag}`);
                removeButton.addEventListener('click', () => removeTag(tag));

                tagElement.appendChild(removeButton);
                container.appendChild(tagElement);
            });
            container.appendChild(input);
        }

        // Remove tag
        function removeTag(tag) {
            currentTags = currentTags.filter(t => t !== tag);
            renderTags();
        }

        // Submit form
        document.getElementById('bookmarkForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const title = document.getElementById('titleInput').value.trim();
            const url = normalizeUrl(document.getElementById('urlInput').value);
            const icon = document.getElementById('iconInput').value.trim() || '🌐';

            bookmarks.push({
                id: Date.now(),
                title,
                url,
                icon,
                tags: [...currentTags]
            });

            saveBookmarks();
            renderBookmarks();
            closeModal();
            currentTags = [];
        });

        // Search input handler
        document.getElementById('searchInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const input = this.value.trim();
                if (input) {
                    // If it looks like a URL, navigate directly
                    if (isProbablyUrl(input)) {
                        navigateTo(normalizeUrl(input));
                    } else {
                        navigateTo(getSearchUrl(input));
                    }
                }
            }
        });

        // Close modal on outside click
        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // Initialize
        loadEngineSelect();
        loadBookmarks();
    </script>
</body>
</html>
